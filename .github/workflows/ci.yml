name: Playwright Cucumber CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run smoke suite
        env:
          BASE_URL: https://www.automationexercise.com
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
        run: npm run test:${{ matrix.browser }}:smoke

      - name: Generate smoke html report
        if: always()
        run: npm run report:html

      - name: Upload smoke html artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-smoke-${{ matrix.browser }}
          path: reports/html

      - name: Upload smoke allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-smoke-${{ matrix.browser }}
          path: allure-results

  sanity-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run sanity suite
        env:
          BASE_URL: https://www.automationexercise.com
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
        run: npm run test:${{ matrix.browser }}:sanity

      - name: Generate sanity html report
        if: always()
        run: npm run report:html

      - name: Upload sanity html artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-sanity-${{ matrix.browser }}
          path: reports/html

      - name: Upload sanity allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-sanity-${{ matrix.browser }}
          path: allure-results

  full-regression-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, safari]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full regression suite
        env:
          BASE_URL: https://www.automationexercise.com
          HEADLESS: true
          BROWSER: ${{ matrix.browser }}
        run: npm run test:${{ matrix.browser }}

      - name: Generate full regression html report
        if: always()
        run: npm run report:html

      - name: Upload full regression html artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-html-full-regression-${{ matrix.browser }}
          path: reports/html

      - name: Upload full regression allure artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-full-regression-${{ matrix.browser }}
          path: allure-results

  aggregate-allure:
    if: always()
    needs: [smoke-tests, sanity-tests, full-regression-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download allure artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: allure-artifacts
          merge-multiple: true

      - name: Generate Allure report
        run: |
          mkdir -p allure-results
          cp -R allure-artifacts/* allure-results/ || true
          npm run allure:generate

      - name: Upload merged allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
